[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --headed --slowmo=100
markers =
    character: 角色创建相关测试
    battle: 战斗系统相关测试
    equipment: 装备系统相关测试
    map: 地图系统相关测试
    skill: 技能系统相关测试
    quest: 任务系统相关测试
    save: 存档系统相关测试
    smoke: 冒烟测试
